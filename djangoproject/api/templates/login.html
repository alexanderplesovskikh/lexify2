  <style>
    .content {
      min-height: 80vh;
    }


    .hide {
      display: none;
    }

    .show {
      display: inline;
    }

    .mb0 {
      margin-bottom: 0px;
    }


    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.6;
    }

    .navbar-wrapper {
      width: 100%;
      background: transparent;
      backdrop-filter: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      margin-bottom: 1.5rem;
      margin-top: 1.5rem;
    }

    .navbar {
      background-color: #ffffffdd;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 60px;
      /* pill shape */
      padding: 0.6rem 1.2rem;
      box-shadow: 0 12px 28px -8px rgba(0, 32, 64, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.2s ease;
    }

    .navbar-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      width: 100%;
    }

    .brand {
      font-size: 1.7rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1e2b4f, #2c3e77);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      padding: 0.2rem 0.8rem 0.2rem 0.3rem;
      border-radius: 40px;
      transition: all 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .brand i {
      font-size: 1.8rem;
      color: #2c3e77;
      background: rgba(44, 62, 119, 0.1);
      border-radius: 50%;
      padding: 0.3rem;
    }

    .nav-toggle {
      display: none;
      /* hidden on desktop */
      font-size: 1.9rem;
      color: #1e2b4f;
      background: rgba(255, 255, 255, 0.5);
      border: 1px transparent rgba(44, 62, 119, 0.2);
      width: 3.2rem;
      height: 3.2rem;
      border-radius: 50%;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
    }

    .nav-toggle:hover {
      background: #ffffff;
      border-color: #2c3e77;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      list-style: none;
      margin: 0;
      padding: 0;
      flex-wrap: wrap;
    }

    .nav-item {
      padding: 0.3rem 0.2rem;
    }

    .nav-link {
      font-size: 1.2rem;
      font-weight: 520;
      padding: 0.65rem 1.2rem;
      border-radius: 40px;
      /* rounded buttons inside navbar */
      background: transparent;
      color: #1e293b;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: all 0.2s;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .nav-link i {
      font-size: 1rem;
      color: #4f5e7b;
    }

    .nav-link:hover {
      background: rgba(44, 62, 119, 0.08);
      border-color: rgba(44, 62, 119, 0.2);
      color: #0f172b;
    }

    .profile-item {
      margin-left: 0.3rem;
    }

    .profile-link {
      background: #ffffff;
      border: 1px solid rgba(44, 62, 119, 0.25);
      border-radius: 50px;
      padding: 0.55rem 1.2rem 0.55rem 1rem;
      font-weight: 550;
      gap: 0.5rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    .profile-link i {
      font-size: 1.4rem;
      color: #1e2b4f;
    }

    .profile-link:hover {
      background: #f5f8ff;
      border-color: #2c3e77;
    }

    @media screen and (max-width: 780px) {
      .navbar {
        border-radius: 40px;
        padding: 0.5rem 1rem;
      }

      .navbar-container {
        position: relative;
      }

      .nav-toggle {
        display: flex;
        order: 3;
      }

      .brand {
        order: 1;
        font-size: 1.5rem;
      }

      .nav-menu {
        order: 4;
        width: 100%;
        flex-direction: column;
        align-items: stretch;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        margin-top: 1rem;
        padding: 1rem 0.8rem;
        border-radius: 40px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        display: none;
        /* hidden until toggle */
      }

      #nav-toggle-checkbox:checked~.nav-menu {
        display: flex;
      }

      .nav-links {
        flex-direction: column;
        align-items: stretch;
        width: 100%;
        gap: 0.3rem;
      }

      .nav-item {
        width: 100%;
        padding: 0.2rem 0;
      }

      .nav-link {

        padding: 0.9rem 1.5rem;
        background: rgba(255, 255, 255, 0.3);
        border: 1px solid transparent;
      }

      .profile-item {
        margin-left: 0;
        margin-top: 0.3rem;
        width: 100%;
      }

      .profile-link {
        justify-content: center;
        background: #ffffffcc;
        width: 100%;
      }

    /*FORM*/
    /* === modern rounded styling for the entire login form === */
    /* matches navbar aesthetic: soft, blurred, rounded, consistent colors */

    /* page title – gradient + soft background */
    .pagetitle {
      font-size: 2.4rem;
      font-weight: 650;
      letter-spacing: -0.02em;

      margin-bottom: 1rem;
      text-align: center;
      padding: 0.5rem 1.5rem;
      display: inline-block;
      width: 100%;
      margin-left: auto;
      margin-right: auto;

    }

    /* form container – gentle, rounded, matches navbar background style */
    .form {
      max-width: 480px;
      margin: 0 auto;
      background: #ffffffdd;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px -15px rgba(0, 32, 64, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    /* floating form group (already styled, but we ensure consistency) */
    .form-floating {
      position: relative;
      width: 100%;
      margin-bottom: 1.2rem;
    }

    .form-floating .form-control {
      display: block;
      width: 100%;
      height: calc(4rem + 2px);
      padding: 1.2rem 1.5rem 0.4rem;
      font-size: 1.1rem;
      line-height: 1.5;
      color: #1e293b;
      background-color: #ffffffdd;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(44, 62, 119, 0.2);
      border-radius: 60px;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 20, 40, 0.02);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s;
    }

    .form-floating .form-control:focus {
      outline: none;
      border-color: #2c3e77;
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(44, 62, 119, 0.15), inset 0 1px 3px #fff;
    }

    .form-floating label {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 1.2rem 1.5rem;
      font-size: 1rem;
      font-weight: 450;
      color: #4f5e7b;
      pointer-events: none;
      border: 1px solid transparent;
      border-radius: 60px;
      transition: all 0.15s ease;
      transform-origin: 0 0;
      line-height: 1.5;
    }

    .form-floating .form-control:focus~label,
    .form-floating .form-control:not(:placeholder-shown)~label {
      transform: scale(0.8) translateY(-0.9rem) translateX(0.2rem);
      background: #ffffff;
      padding: 0.6rem 0.8rem;
      /*0.15 default*/
      left: 1rem;
      top: -0.1rem;
      width: auto;
      height: auto;
      color: #2c3e77;
      font-weight: 550;
      border-radius: 30px;
      border: 1px solid rgba(44, 62, 119, 0.2);
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
      line-height: 1.2;
      z-index: 2;
    }

    .form-floating .form-control::placeholder {
      color: transparent;
    }

    /* message box – error / info panels */
    #message_box .alert,
    #message_box.alert {
      background: rgba(255, 245, 245, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(220, 80, 80, 0.3);
      border-radius: 40px;
      padding: 1rem 1.5rem;
      color: #b13e3e;
      font-weight: 500;
      box-shadow: 0 6px 14px rgba(200, 60, 60, 0.1);
      margin-bottom: 1.5rem;
    }

    .alert-danger {
      background: rgba(255, 235, 235, 0.9);
      border-color: rgba(200, 70, 70, 0.4);
      color: #a43a3a;
    }

    .pInAlert {
      margin-bottom: 0;
      font-size: 1.1rem;
    }

    /* buttons – primary, large, rounded, with hover effects */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 60px !important;
      /* force pill shape */
      font-weight: 550;
      font-size: 1.2rem;
      padding: 0.9rem 1.8rem;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      box-shadow: 0 6px 14px rgba(0, 20, 40, 0.08);
      line-height: 1.5;
      gap: 0.5rem;
    }

    .btn-primary {
      background: #2c3e77;
      color: white;
      border-color: #1e2b4f;
    }

    .btn-primary:hover {
      background: #1e2b4f;
      transform: translateY(-2px);
      box-shadow: 0 12px 22px -8px #1e2b4f80;
      border-color: #0f1a30;
    }

    .btn-lg {
      font-size: 1.3rem;
      padding: 1rem 2rem;
    }

    .d-grid {
      display: grid;
    }

    .d-grid .btn {
      width: 100%;
    }

    /* spinner styling */
    .spinner-grow {
      display: inline-block;
      width: 1.2rem;
      height: 1.2rem;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.8;
      animation: spinner-grow 0.9s linear infinite;
    }

    @keyframes spinner-grow {
      0% {
        transform: scale(0);
      }

      50% {
        opacity: 1;
        transform: none;
      }
    }

    /* hide utility – matches your style */
    .hide {
      display: none !important;
    }

    /* text-center and margins */
    .text-center {
      text-align: center;
    }

    .mb0 {
      margin-bottom: 0;
    }

    .mb-3 {
      margin-bottom: 1.2rem;
    }

    /* additional small polish for hidden elements */
    [hidden] {
      display: none !important;
    }

    /* control containers */
    .control {
      margin-top: 1.2rem;
    }

    /* fine tune spacing */
    #pass_box {
      transition: all 0.2s;
    }

    /* if you ever use display-2 (hidden here, but styled if shown) */
    .display-2 {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #2c3e77;
    }

    /* responsive touch */
    @media (max-width: 480px) {
      .form {
        padding: 1.8rem 1.2rem;
        border-radius: 40px;
      }

      .pagetitle {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>


  <div class="container">
    <div class="navbar-wrapper">
      <nav class="navbar">
        <div class="navbar-container">
          <input type="checkbox" id="nav-toggle-checkbox" style="display: none;">

          <a href="/" class="brand">
            <i class="fas fa-check"></i> Lexify
          </a>

          <label for="nav-toggle-checkbox" class="nav-toggle" aria-label="toggle menu">
            <i class="fas fa-bars"></i>
          </label>

          <div class="nav-menu">
            <ul class="nav-links">
              <li class="nav-item"><a href="/" class="nav-link">старт</a></li>
              <li class="nav-item"><a href="/doc" class="nav-link">проверить</a></li>
              <li class="nav-item"><a href="/faq" class="nav-link">faq</a></li>
              <li class="nav-item"><a href="/stats" class="nav-link">данные</a></li>
              <li class="nav-item"><a href="https://app.lexiqo.ru/oldcheck" class="nav-link">прошлая версия</a></li>
            </ul>

            <div class="profile-item">
              <a href="/profile" class="nav-link profile-link">
                <i class="fas fa-user-circle"></i> профиль
              </a>
            </div>
          </div>
        </div>
      </nav>

    </div>
  </div>


  <div style="position: fixed; bottom: 24px; right: 24px; z-index: 9999;">
    <a href="https://chat.lexiqo.ru"
      style="display: flex; align-items: center; justify-content: center; width: 58px; height: 58px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 15px 30px -8px rgba(102, 126, 234, 0.5); text-decoration: none;"
      onmouseover="this.style.transform='scale(1.12) rotate(5deg)'; this.style.boxShadow='0 20px 35px -5px rgba(102, 126, 234, 0.7)'"
      onmouseout="this.style.transform='scale(1) rotate(0deg)'; this.style.boxShadow='0 15px 30px -8px rgba(102, 126, 234, 0.5)'"
      target="_blank" rel="noopener noreferrer">
      <i class="fas fa-comment" style="font-size: 28px; color: white;"></i>
    </a>
  </div>



  <div class="content">
    <div class="container">

      <div class="row">

        <div class="col-12 col-lg-4"></div>

        <div class="col-12 col-lg-4">

          <h1 class="pagetitle" style="text-align: center;">Войти в аккаунт 🔐</h1>

          <div class="form" style="margin-bottom: 2rem;">
            <div id="login_form">

              <h1 class="text-center display-2" style="display: none;"><i class="bi bi-person-circle"></i></h1>

              <div id="message_box" class="hide">
                <div class="alert alert-danger">
                  <p class="pInAlert mb0 text-center">error</p>
                </div>
              </div>



              <div class="form-floating mb-3">
                <input autocomplete="email" type="email" required class="form-control" name="username"
                  id="floatingEmail" placeholder="name@example.ru">
                <label for="floatingEmail">Email</label>
              </div>

              <div id="pass_box" class="hide">
                <div class="form-floating mb-3">
                  <input type="text" class="form-control" name="password" id="floatingPassword" placeholder="123456"
                    inputmode="numeric" autocomplete="off">
                  <label for="floatingPassword">Код</label>
                </div>
              </div>

              <div class="control" id="button_login">
                <p class="text-center mb0">
                <div class="d-grid">
                  <button type="submit" class="btn btn-lg btn-primary button" id="login">Далее
                    <div id="spinner_box" class="hide">
                      <div class="spinner-grow spinner-grow-sm" role="status">
                        <span class="visually-hidden"></span>
                      </div>
                    </div>
                  </button>
                </div>
                </p>
              </div>


              <div class="control hide" id="button_verify">
                <p class="text-center mb0">
                <div class="d-grid">
                  <button type="submit" class="btn btn-lg btn-primary button" id="verify">Подтвердить код
                    <div id="spinner_box_verify" class="hide">
                      <div class="spinner-grow spinner-grow-sm" role="status">
                        <span class="visually-hidden"></span>
                      </div>
                    </div>
                  </button>
                </div>
                </p>
              </div>


              <p class="text-center" hidden>Продолжая, Вы соглашаетесь с условиями использования и политикой в
                отношении файлов cookie.</p>



            </div>
          </div>

        </div>

        <div class="col-12 col-lg-4"></div>

      </div>


    </div>
  </div>


  <script>
    if (localStorage.getItem("fgtregv5gvhjy7rvnj")) {
      window.location.href = "/";
    }
  </script>

  <script src="{% static 'js/log.js' %}"></script>


  <script src="{% static 'js/main.js' %}"></script>
  <script src="{% static 'js/axios.js' %}"></script>

  <script>

    let is_code_ver = 0;

    let message_box = document.getElementById("message_box");
    let pass_box = document.getElementById("pass_box");
    let spinner_box = document.getElementById("spinner_box");
    let button_login = document.getElementById("button_login");
    let button_verify = document.getElementById("button_verify");
    let spinner_box_verify = document.getElementById("spinner_box_verify");

    let login_button = document.getElementById("login");
    let verify = document.getElementById("verify");

    function logSubmit(event) {
      event.preventDefault();
      console.log('login init');
      let base_url = '/send_code/';
      let email = document.getElementById("floatingEmail").value;
      spinner_box.className = "show";
      send_code(base_url, email);
    }

    function verifySubmit(event) {
      event.preventDefault();
      console.log('login verify');
      let base_url = '/verify_code/';
      let email = document.getElementById("floatingEmail").value;
      let code = document.getElementById("floatingPassword").value;
      spinner_box_verify.className = "show";
      verify_code(base_url, email, code);
    }

    login_button.addEventListener("click", logSubmit);
    verify.addEventListener("click", verifySubmit);

    let floatingEmail = document.getElementById("floatingEmail");
    floatingEmail.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        if (is_code_ver == 0) {
          document.getElementById("login").click();
          console.log('first btn clicked');
        }
      }
    });

    let floatingPass = document.getElementById("floatingPassword");
    floatingPass.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        if (is_code_ver == 1) {
          document.getElementById("verify").click();
          console.log('second btn clicked');
        }
      }
    });

    async function send_code(base_url, email) {
      try {
        await axios.get(base_url, {
          params: {
            "email": email,
          },
          headers: {
            "X-CSRFToken": "{{ csrf_token }}"
          },
        })
          .then((result) => {
            if (result) {
              if (result["request"]["status"]) {


                if (result['data']['status'] == 'error') {

                  message_box.innerHTML = '<div class="alert alert-danger"><p class="pInAlert mb0 text-center">' + result['data']['message'] + '</p></div>';
                  message_box.className = "show";
                  spinner_box.className = "hide";

                }

                if (result['data']['status'] == 'ok') {

                  is_code_ver = 1;



                  if (result['data']['link'] == '/') {
                    var span_mail = '';
                  } else {
                    var span_mail = '.<br><a href="' + result['data']['link'] + '" class="" target="_blank">Перейти в почту <i class="bi bi-box-arrow-up-right"></i></a>';
                  }

                  let floatingEmail_idx = document.getElementById("floatingEmail");
                  floatingEmail_idx.disabled = true;

                  message_box.innerHTML = '<div class="alert alert-success"><p class="pInAlert mb0 text-center">' + result['data']['message'] + span_mail + '</p></div>';
                  message_box.className = "show";

                  spinner_box.className = "hide";
                  button_login.className = "hide";
                  pass_box.className = "show";
                  button_verify.classList = "control show";

                  floatingPass.focus();




                }

              }
            }
          });
      } catch (error) {

        console.log(error);
        spinner_box.className = "hide";
        message_box.className = "show";
        message_box.innerHTML = '<div class="alert alert-warning"><p class="pInAlert mb0 text-center">' + error + '</p></div>';

      }
    }


    async function verify_code(base_url, email, code) {
      try {
        await axios.get(base_url, {
          params: {
            "email": email,
            "code": code,
          },
          headers: {
            "X-CSRFToken": "{{ csrf_token }}"
          },
        })
          .then((result) => {
            if (result) {
              if (result["request"]["status"]) {


                if (result['data']['status'] == 'error') {

                  message_box.innerHTML = '<div class="alert alert-danger"><p class="pInAlert mb0 text-center">' + result['data']['message'] + '</p></div>';
                  message_box.className = "show";
                  spinner_box_verify.className = "hide";

                }

                if (result['data']['status'] == 'ok') {


                  message_box.innerHTML = '<div class="alert alert-success"><p class="pInAlert mb0 text-center">Успешная авторизация</p></div>';
                  message_box.className = "show";
                  spinner_box_verify.className = "hide";

                  localStorage.setItem("fgtregv5gvhjy7rvnj", result['data']['token']);
                  localStorage.setItem("fgtregv5gvhjy7rvnja", email);
                  window.location.href = '/doc';








                }

              }
            }
          });
      } catch (error) {

        console.log(error);
        spinner_box_verify.className = "hide";
        message_box.className = "show";
        message_box.innerHTML = '<div class="alert alert-warning"><p class="pInAlert mb0 text-center">' + error + '</p></div>';

      }
    }


  </script>

</body>

</html>
